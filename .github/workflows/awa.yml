name: Build Mesa Zink (OpenGL only, Android 12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (if you have patches)
        uses: actions/checkout@v4

      - name: Clone Mesa 25.0.0
        run: |
          git clone --depth 1 --branch mesa-25.0.0 https://gitlab.freedesktop.org/mesa/mesa.git

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip meson ninja-build pkg-config \
            libdrm-dev libelf-dev glslang-tools
          pip3 install mako

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Create cross file
        run: |
          NDK=${{ steps.ndk.outputs.ndk-path }}
          cat > android-aarch64.txt << EOF
          [binaries]
          c = '$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang'
          cpp = '$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++'
          ar = '$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          pkg-config = '/usr/bin/pkg-config'
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'
          EOF

      - name: Configure and build Mesa (Zink only)
        run: |
          export ANDROID_NDK=${{ steps.ndk.outputs.ndk-path }}
          export CFLAGS="-DETIME=ETIMEDOUT"
          export CXXFLAGS="-DETIME=ETIMEDOUT"
          cd mesa
          meson setup build \
            --cross-file ../android-aarch64.txt \
            -Dplatforms=android \
            -Dgallium-drivers=zink \
            -Dvulkan-drivers= \
            -Dandroid-stub=true \
            -Dbuildtype=release \
            -Dllvm=disabled \
            -Dglx=disabled \
            -Degl=disabled \
            -Dshared-glapi=enabled \
            -Dopengl=true \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dglvnd=disabled \
            -Ddri-drivers=
          ninja -C build

      - name: Copy libGL.so.1.5.0
        run: |
          mkdir -p artifacts
          cp mesa/build/src/gallium/targets/dri/libgallium_dri.so artifacts/libGL.so.1.5.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-zink-android
          path: artifacts/libGL.so.1.5.0
