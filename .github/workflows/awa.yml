name: Compile Stripped Mesa Zink for Android 12

on:
  workflow_dispatch:

jobs:
  build-zink:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3-pip ninja-build cmake bison flex xz-utils

      - name: Setup Python, Meson and Mako
        run: |
          python3 -m pip install --upgrade pip
          pip3 install meson mako

      - name: Locate Pre-Cached Android NDK
        run: |
          # Finds the system-installed Android NDK path on the GitHub runner
          NDK_PATH=$(find /usr/local/lib/android/sdk/ndk -maxdepth 1 -mindepth 1 | sort -V | tail -n 1)
          echo "Found pre-installed NDK at: $NDK_PATH"
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV

      - name: Fetch Upstream Mesa 25.0.0
        run: |
          git clone --depth 1 --branch mesa-25.0.0 https://freedesktop.org mesa-src

      - name: Generate Meson Android Cross-File
        run: |
          cat << 'EOF' > mesa-src/android12-aarch64.txt
          [binaries]
          c = '${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang'
          cpp = '${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang++'
          ar = '${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'
          EOF

      - name: Configure and Strip Mesa Build Structure (Android 12 Target)
        run: |
          cd mesa-src
          meson setup build-zink-only \
            --cross-file android12-aarch64.txt \
            -Dbuildtype=release \
            -Dplatform-sdk-version=31 \
            -Dgallium-drivers=zink \
            -Dvulkan-drivers=[] \
            -Dopengl=true \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dplatforms=android \
            -Dllvm=disabled \
            -Dshared-glapi=enabled \
            -Dgallium-vdpau=disabled \
            -Dgallium-va=disabled \
            -Dvideo-codecs=[]

      - name: Compile Standalone Zink Binary
        run: |
          cd mesa-src
          ninja -C build-zink-only

      - name: Locate and Prepare Output Artifacts
        run: |
          mkdir -p output/
          find mesa-src/build-zink-only/ -name "libGL.so" -exec cp {} output/ \;
          find mesa-src/build-zink-only/ -name "libgallium_dri.so" -exec cp {} output/ \; || true

      - name: Upload Stripped libGL Binary
        uses: actions/upload-artifact@v4
        with:
          name: Mesa-25.0.0-Zink-Android12-ARM64
          path: output/
          if-no-files-found: error
