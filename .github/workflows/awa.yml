name: Compile Stripped Mesa Zink for Android 12

on: [workflow_dispatch]

jobs:
  build-zink:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build
      - name: Sparse-Download NDK
        run: |
          git clone --filter=blob:none --sparse --depth 1 https://googlesource.com ndk-light
          cd ndk-light && git sparse-checkout set platform/sysroot toolchains/llvm/prebuilt/linux-x86_64
          echo "ANDROID_NDK_ROOT=$(pwd)/ndk-light" >> $GITHUB_ENV
      - name: Fetch Mesa
        run: git clone --depth 1 --branch mesa-25.0.0 https://freedesktop.org mesa-src
      - name: Create Cross-File
        run: |
          cat << 'EOF' > mesa-src/android12-aarch64.txt
          [binaries]
          c = '${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang'
          cpp = '${{ env.ANDROID_NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang++'
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          EOF
      - name: Build Zink
        run: |
          cd mesa-src && meson setup build --cross-file android12-aarch64.txt -Dgallium-drivers=zink -Dplatform-sdk-version=31
          ninja -C build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mesa-Zink-Android12
          path: mesa-src/build/src/gallium/targets/libgl-xlib/libGL.so
