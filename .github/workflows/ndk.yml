name: Push Android NDK r27c to Mesa-Zink-

on:
  workflow_dispatch:

jobs:
  upload-ndk-to-repo:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the destination repository where the folder needs to go
      - name: Checkout Mesa-Zink- repository
        uses: actions/checkout@v4
        with:
          repository: 'MXBikeraGIT/Mesa-Zink-'
          token: ${{ secrets.NDK_PUSH_TOKEN }}
          path: 'Mesa-Zink-'

      # Step 2: Create the local target directory inside the checked-out repo
      - name: Create NDK directory
        run: mkdir -p Mesa-Zink-/ndk

      # Step 3: Fetch and extract NDK via Action 
      - name: Setup Android NDK via Action
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: false

      # Step 4: Move the extracted files into the cloned repository's ndk folder
      - name: Move NDK files into repository
        run: |
          mv ${{ steps.setup-ndk.outputs.ndk-path }}/* Mesa-Zink-/ndk/

      # Step 5: Configure Git, stage the files, commit, and push directly to GitHub
      - name: Commit and Push NDK to GitHub
        run: |
          cd Mesa-Zink-
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ndk/
          git commit -m "chore: add Android NDK r27c binaries"
          git push origin HEAD
