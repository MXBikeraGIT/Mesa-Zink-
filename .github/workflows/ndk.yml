name: Setup Android NDK r27c

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download-ndk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create NDK directory
        run: mkdir -p ndk

      - name: Download Android NDK r27c
        run: |
          curl -L -o ndk.zip https://google.com

      - name: Extract NDK to target folder
        run: |
          unzip -q ndk.zip -d ndk
          rm ndk.zip

      - name: Clean up folder structure
        run: |
          mv ndk/android-ndk-r27c/* ndk/
          rmdir ndk/android-ndk-r27c

      - name: Verify NDK placement
        run: ls -la ndk
